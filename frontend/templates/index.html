{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Tasks Tester</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <main class="page">
      <h1>CV Tasks Tester</h1>

      <form id="cvForm" class="panel">
        {% csrf_token %}
        <div class="row">
          <label for="image">Input image</label>
          <input id="image" name="image" type="file" accept="image/*" required />
        </div>

        <div class="row">
          <label for="operation">Operation</label>
          <select id="operation" name="operation">
            <option value="read_info">Read image info</option>
            <option value="save_grayscale">Convert to grayscale</option>
            <option value="add_noise">Add noise</option>
            <option value="low_pass">Low-pass filter</option>
            <option value="edges">Edge detection</option>
            <option value="hist_cdf">Histogram + CDF</option>
            <option value="equalize">Equalize image</option>
            <option value="normalize">Normalize image</option>
            <option value="threshold">Thresholding</option>
            <option value="freq_filter">Frequency filter</option>
            <option value="hybrid">Hybrid image</option>
            <!-- PROBLEM 3 FIX: new transformation operation -->
            <option value="transformation">Transformation (Color → Gray + RGB plots)</option>
          </select>
        </div>

        <!-- ── Hybrid: second image ── -->
        <section class="group" data-op="hybrid">
          <div class="row">
            <label for="image2">Second image (hybrid)</label>
            <input id="image2" name="image2" type="file" accept="image/*" />
          </div>
        </section>

        <!-- ── Add noise ── -->
        <section class="group" data-op="add_noise">
          <div class="row">
            <label for="noise_type">Noise type</label>
            <select id="noise_type" name="noise_type">
              <option value="gaussian">Gaussian</option>
              <option value="uniform">Uniform</option>
              <option value="salt_pepper">Salt &amp; pepper</option>
            </select>
          </div>
          <div class="row">
            <label for="amount">Salt/Pepper amount (0-1)</label>
            <input id="amount" name="amount" type="number" step="0.01" min="0" max="1" value="0.05" />
          </div>
          <div class="row">
            <label for="sigma">Gaussian sigma</label>
            <input id="sigma" name="sigma" type="number" step="0.1" min="0" value="25" />
          </div>
          <div class="row">
            <label for="uniform_range">Uniform range</label>
            <input id="uniform_range" name="uniform_range" type="number" min="1" value="30" />
          </div>
        </section>

        <!-- ── Low-pass filter ── -->
        <section class="group" data-op="low_pass edges">
          <div class="row">
            <label for="kernel_size">Kernel size (odd)</label>
            <input id="kernel_size" name="kernel_size" type="number" min="3" step="2" value="3" />
          </div>
          <div class="row" data-op="low_pass">
            <label for="filter_type">Filter type</label>
            <select id="filter_type" name="filter_type">
              <option value="average">Average</option>
              <option value="gaussian">Gaussian</option>
              <option value="median">Median</option>
            </select>
          </div>
          <div class="row" data-op="low_pass">
            <label for="sigma_lp">Gaussian sigma</label>
            <input id="sigma_lp" name="sigma_lp" type="number" step="0.1" min="0.1" value="1.0" />
          </div>
        </section>

        <!-- ── Edge detection ── -->
        <section class="group" data-op="edges">
          <div class="row">
            <label for="edge_method">Edge method</label>
            <select id="edge_method" name="edge_method">
              <option value="sobel">Sobel</option>
              <option value="prewitt">Prewitt</option>
              <option value="roberts">Roberts</option>
              <option value="canny">Canny</option>
            </select>
          </div>
          <div class="row">
            <label for="threshold1">Canny threshold 1</label>
            <input id="threshold1" name="threshold1" type="number" value="50" />
          </div>
          <div class="row">
            <label for="threshold2">Canny threshold 2</label>
            <input id="threshold2" name="threshold2" type="number" value="150" />
          </div>
        </section>

        <!-- ── Histogram + CDF ── -->
        <section class="group" data-op="hist_cdf">
          <div class="row">
            <label for="hist_mode">Histogram mode</label>
            <select id="hist_mode" name="hist_mode">
              <option value="gray">Gray</option>
              <option value="rgb">RGB</option>
            </select>
          </div>
        </section>

        <!-- ── Normalize ── -->
        <section class="group" data-op="normalize">
          <div class="row">
            <label for="alpha">Normalize alpha</label>
            <input id="alpha" name="alpha" type="number" step="0.1" value="0" />
          </div>
          <div class="row">
            <label for="beta">Normalize beta</label>
            <input id="beta" name="beta" type="number" step="0.1" value="255" />
          </div>
          <div class="row">
            <label for="norm_type">Normalize type</label>
            <select id="norm_type" name="norm_type">
              <option value="minmax">minmax</option>
              <option value="inf">inf</option>
            </select>
          </div>
        </section>

        <!--
          PROBLEM 2 FIX: threshold method is Binary (cv::THRESH_BINARY).
          Rule: pixel > threshold → max_value, else → 0.
          The label "Binary" is now shown explicitly.
        -->
        <section class="group" data-op="threshold">
          <div class="row">
            <label>Threshold method</label>
            <span style="line-height:36px; font-weight:600;">Binary
              <small style="font-weight:400; color:#6b7280;">
                (pixel &gt; threshold → max_value, else 0)
              </small>
            </span>
          </div>
          <div class="row">
            <label for="threshold">Threshold value</label>
            <input id="threshold" name="threshold" type="number" step="0.1" value="127" />
          </div>
          <div class="row">
            <label for="max_value">Max value</label>
            <input id="max_value" name="max_value" type="number" step="0.1" value="255" />
          </div>
        </section>

        <!-- ── Frequency filter ── -->
        <section class="group" data-op="freq_filter">
          <div class="row">
            <label for="freq_type">Frequency type</label>
            <select id="freq_type" name="freq_type">
              <option value="low_pass">low_pass</option>
              <option value="high_pass">high_pass</option>
            </select>
          </div>
          <div class="row">
            <label for="cutoff">Cutoff radius</label>
            <input id="cutoff" name="cutoff" type="number" min="1" value="30" />
          </div>
        </section>

        <!-- ── Hybrid ── -->
        <section class="group" data-op="hybrid">
          <div class="row">
            <label for="low_sigma">Low sigma</label>
            <input id="low_sigma" name="low_sigma" type="number" step="0.1" min="0.1" value="5.0" />
          </div>
          <div class="row">
            <label for="high_sigma">High sigma</label>
            <input id="high_sigma" name="high_sigma" type="number" step="0.1" min="0.1" value="3.0" />
          </div>
          <div class="row">
            <label for="mix_weight">Mix weight (0-1)</label>
            <input id="mix_weight" name="mix_weight" type="number" step="0.01" min="0" max="1" value="0.5" />
          </div>
        </section>

        <!-- ── Transformation: no extra controls needed ── -->
        <section class="group" data-op="transformation">
          <div class="row">
            <label>Output</label>
            <span style="line-height:36px; color:#6b7280;">
              Grayscale image + Histogram &amp; CDF for Gray, R, G, B channels
            </span>
          </div>
        </section>

        <button type="submit">Run</button>
        <span id="status"></span>
      </form>

      <section class="panel">
        <h2>Preview</h2>
        <div id="images" class="images"></div>
        <pre id="jsonOut"></pre>
      </section>
    </main>

    <script src="{% static 'js/main.js' %}"></script>
  </body>
</html>
